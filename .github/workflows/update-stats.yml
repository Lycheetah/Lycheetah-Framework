name: Update README Stats

on:
  push:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install numpy scipy pytest

    - name: Run stats updater
      run: python promote.py --update-readme

    - name: Commit updated stats if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Lycheetah Stats Bot"
        git add README.md
        git diff --staged --quiet || git commit -m "chore: auto-update README stats [skip ci]"
        git push
